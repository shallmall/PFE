services:
  # Backend AI & Blockchain API Service
  backend:
    build:
      context: ./Deployment
      dockerfile: Dockerfile
    container_name: reputation_ai_backend
    ports:
      - "8000:8000"
    env_file:
      - ./Deployment/.env
    environment:
      - DATABASE_URL=sqlite:///./db/reviews_ledger.db
    volumes:
      - sqlite_db_data:/app/db
      - ./data:/app/data
    restart: unless-stopped

  # Frontend Consumer E-Commerce UI (Trojan Horse)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: verified_store_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_db_data:
    name: alastria_ai_db_storage
