services:
  reputation_ai_service:
    build: .
    container_name: reputation_ai_alastria
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Fallback database URL pointing to dedicated Docker volume if not overridden in .env
      - DATABASE_URL=sqlite:///./db/reviews_ledger.db
    volumes:
      # Independent dedicated persistent volume for database storage
      - sqlite_db_data:/app/db
    restart: unless-stopped

volumes:
  sqlite_db_data:
    name: alastria_ai_db_storage
